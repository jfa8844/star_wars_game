<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars: Trench Run Prototype</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050510;
            color: #ffe81f;
            /* Star wars yellow */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            margin-bottom: 20px;
            text-shadow: 0 0 15px #ffe81f;
            letter-spacing: 2px;
        }

        #gameContainer {
            position: relative;
        }

        canvas {
            background: #000;
            border: 3px solid #ffe81f;
            box-shadow: 0 0 30px rgba(255, 232, 31, 0.4);
            border-radius: 8px;
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #ffe81f;
            z-index: 10;
        }

        #ammoContainer {
            position: absolute;
            top: 60px;
            left: 20px;
            width: 200px;
            height: 20px;
            border: 2px solid #ffe81f;
            background: #222;
            z-index: 10;
        }

        #ammoBar {
            height: 100%;
            background: #00ff00;
            width: 100%;
            transition: width 0.1s, background-color 0.2s;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border: 2px solid #ffe81f;
            box-shadow: 0 0 20px #ffe81f;
            border-radius: 10px;
            z-index: 20;
        }

        h2 {
            font-size: 36px;
            margin-top: 0;
            color: #ff3333;
            text-shadow: 0 0 10px #ff3333;
        }

        button {
            background: #ffe81f;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.2s;
            border-radius: 4px;
        }

        button:hover {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }

        .controls {
            margin-top: 20px;
            font-size: 18px;
            opacity: 0.8;
            text-align: center;
        }

        .key {
            background: #222;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #555;
            color: #fff;
        }
    </style>
</head>

<body>
    <h1>STAR WARS: HYPERSPACE SURVIVOR</h1>
    <div id="gameContainer">
        <div id="ui">SCORE: <span id="scoreVal">0</span></div>
        <div id="ammoContainer">
            <div id="ammoBar"></div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="gameOver">
            <h2>GAME OVER</h2>
            <p style="font-size: 20px;">The Empire Got You.</p>
            <p style="font-size: 24px; margin: 20px 0;">Final Score: <span id="finalScore">0</span></p>
            <button id="restartBtn">PLAY AGAIN</button>
        </div>
        <button id="skipBtn"
            style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 50;">START
            OVER</button>
        <div id="startScreen"
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); z-index: 100;">
            <h1
                style="font-family: 'Courier New'; font-size: 40px; color: #ffe81f; text-align: center; margin-bottom: 20px;">
                STAR WARS<br>HYPERSPACE SURVIVOR</h1>
            <p
                style="font-family: 'Courier New'; color: #fff; font-size: 20px; max-width: 600px; text-align: center; margin-bottom: 40px;">
                Survive the asteroid field, defeat the Empire, and destroy the Death Star. May the Force be with you.
            </p>
            <button id="startGameBtn"
                style="font-size: 24px; padding: 15px 40px; background: #ffe81f; color: #000; border: none; cursor: pointer; border-radius: 5px; font-weight: bold;">CLICK
                TO START MISSION</button>
            <button id="skinsBtn"
                style="font-size: 20px; padding: 10px 30px; background: #222; color: #ffe81f; border: 2px solid #ffe81f; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 15px;">HANGAR:
                CHANGE SHIP</button>
        </div>
        <div id="skinScreen"
            style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); z-index: 100;">
            <h1 style="color: #ffe81f; margin-bottom: 30px;">SELECT SHIP SKIN</h1>
            <div id="skinList"
                style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 800px; margin-bottom: 30px;">
                <!-- Filled dynamically -->
            </div>
            <p style="color: #fff; margin-bottom: 20px;" id="skinStatsText"></p>
            <p style="color: #fff; margin-bottom: 20px;" id="skinStatsText"></p>
            <div style="display: flex; gap: 20px;">
                <button id="backSkinsBtn"
                    style="font-size: 20px; padding: 10px 30px; background: #222; color: #ffe81f; border: 2px solid #ffe81f; cursor: pointer; border-radius: 5px; font-weight: bold;">BACK
                    TO MENU</button>
                <button id="resetSkinsBtn"
                    style="font-size: 20px; padding: 10px 30px; background: #ff3333; color: #fff; border: 2px solid #ff0000; cursor: pointer; border-radius: 5px; font-weight: bold;">RESET
                    PROGRESS</button>
            </div>
        </div>
    </div>
    <div class="controls">
        Controls: <span class="key">←</span> <span class="key">→</span> to move | <span class="key">SPACE</span> to fire
        blasters
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('scoreVal');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScore = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const skipBtn = document.getElementById('skipBtn');
        const ammoBar = document.getElementById('ammoBar');

        let score = 0;
        let isGameOver = false;
        let isGameWon = false;
        let isCelebrating = false;
        let celebrationStartTime = 0;
        let animationId;
        let lastEnemySpawn = 0;
        let enemySpawnRate = 1500; // ms

        let winAudio = new Audio('https://ia601407.us.archive.org/26/items/StarWarsThemeSongByJohnWilliams/Star%20Wars%20Theme%20Song%20By%20John%20Williams.mp3');
        winAudio.volume = 0.5;

        // Asteroid Field / Intro song (Using main theme due to Archive.org node 503 error for Asteroid Field)
        let introAudio = new Audio('https://ia601407.us.archive.org/26/items/StarWarsThemeSongByJohnWilliams/Star%20Wars%20Theme%20Song%20By%20John%20Williams.mp3');
        introAudio.volume = 0.4;
        introAudio.loop = true;

        let gameStarted = false;
        document.getElementById('startGameBtn').addEventListener('click', () => {
            document.getElementById('startScreen').style.display = 'none';
            gameStarted = true;
            introAudio.play().catch(e => console.log("Audio waiting:", e));
        });

        document.getElementById('skinsBtn').addEventListener('click', () => {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('skinScreen').style.display = 'flex';
            updateSkinsMenu();
        });

        document.getElementById('backSkinsBtn').addEventListener('click', () => {
            document.getElementById('skinScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
        });

        document.getElementById('resetSkinsBtn').addEventListener('click', () => {
            if (confirm("Are you sure you want to reset all game progress? This cannot be undone.")) {
                totalTiesTracker = 0;
                roundsCompletedTracker = 0;
                selectedSkin = 'X-Wing';
                localStorage.setItem('swGame_totalTies', 0);
                localStorage.setItem('swGame_roundsCompleted', 0);
                localStorage.setItem('swGame_selectedSkin', 'X-Wing');
                updateSkinsMenu(); // Refresh UI
            }
        });

        const skinsData = [
            {
                name: "X-Wing",
                condition: () => true,
                desc: "Default",
                getProgress: () => 100
            },
            {
                name: "TIE Fighter",
                condition: () => totalTiesTracker >= 25,
                desc: "Defeat 25 TIEs.",
                getProgress: () => Math.min(100, (totalTiesTracker / 25) * 100)
            },
            {
                name: "B-wing",
                condition: () => totalTiesTracker >= 50,
                desc: "Defeat 50 TIEs.",
                getProgress: () => Math.min(100, (totalTiesTracker / 50) * 100)
            },
            {
                name: "Millennium Falcon",
                condition: () => roundsCompletedTracker >= 2,
                desc: "Clear Death Star 2 times.",
                getProgress: () => Math.min(100, (roundsCompletedTracker / 2) * 100)
            },
            {
                name: "Star Destroyer",
                condition: () => roundsCompletedTracker >= 5,
                desc: "Clear Death Star 5 times.",
                getProgress: () => Math.min(100, (roundsCompletedTracker / 5) * 100)
            },
            {
                name: "Death Star",
                condition: () => totalTiesTracker >= 150 && roundsCompletedTracker >= 10,
                desc: "Defeat 150 TIEs and clear Death Star 10 times.",
                getProgress: () => {
                    let tieProg = Math.min(100, (totalTiesTracker / 150) * 100);
                    let dsProg = Math.min(100, (roundsCompletedTracker / 10) * 100);
                    return (tieProg + dsProg) / 2; // Average progress for display
                }
            }
        ];

        function updateSkinsMenu() {
            const list = document.getElementById('skinList');
            const stats = document.getElementById('skinStatsText');
            list.innerHTML = '';
            stats.innerText = `LIFETIME KILLS (TIEs): ${totalTiesTracker} | DEATH STARS DESTROYED: ${roundsCompletedTracker}`;

            // Handle "Next Available Ship" tracking bar
            let nextP = document.getElementById('nextSkinStatsText');
            if (!nextP) {
                nextP = document.createElement('p');
                nextP.id = 'nextSkinStatsText';
                nextP.style.color = '#ff9900';
                nextP.style.fontWeight = 'bold';
                nextP.style.marginBottom = '20px';
                stats.parentNode.insertBefore(nextP, stats.nextSibling);
            }
            let nextShip = skinsData.find(s => !s.condition());
            let nextShipText = nextShip ? `NEXT UNLOCK: ${nextShip.name} (${Math.floor(nextShip.getProgress())}%)` : "ALL SHIPS UNLOCKED!";
            nextP.innerText = nextShipText;
            nextP.style.color = nextShip ? '#ff9900' : '#00ff00';

            skinsData.forEach(skin => {
                const isUnlocked = skin.condition();
                const prog = isUnlocked ? 100 : Math.floor(skin.getProgress());
                const btn = document.createElement('div');
                btn.style.padding = '15px 20px';
                btn.style.border = isUnlocked ? '2px solid #00ff00' : '2px solid #ff3333';
                btn.style.background = (selectedSkin === skin.name) ? 'rgba(0, 255, 0, 0.2)' : '#222';
                btn.style.color = isUnlocked ? '#fff' : '#666';
                btn.style.borderRadius = '8px';
                btn.style.cursor = isUnlocked ? 'pointer' : 'not-allowed';
                btn.style.textAlign = 'center';
                btn.style.width = '240px';
                btn.style.position = 'relative';
                btn.style.overflow = 'hidden';

                // Progress Bar Background Layer
                const progBarHeight = "8px";
                const progBar = `<div style="position: absolute; bottom: 0; left: 0; height: ${progBarHeight}; width: ${prog}%; background: ${isUnlocked ? '#00ff00' : '#ff9900'}; transition: width 0.3s; pointer-events: none;"></div>`;

                btn.innerHTML = `<div style="position: relative; z-index: 2; padding-bottom: ${progBarHeight};">
                                 <h3 style="margin:0 0 10px 0;">${skin.name}</h3>
                                 <p style="font-size: 14px; margin: 0; min-height: 34px;">${isUnlocked ? "UNLOCKED" : skin.desc}</p>
                                 ${!isUnlocked ? `<p style="font-size: 12px; margin: 8px 0 0 0; color: #ff9900; font-weight:bold;">Progress: ${prog}%</p>` : ''}
                                 </div>
                                 ${progBar}`;

                if (isUnlocked) {
                    btn.addEventListener('click', () => {
                        selectedSkin = skin.name;
                        localStorage.setItem('swGame_selectedSkin', selectedSkin);
                        updateSkinsMenu(); // re-render selection highlights
                    });
                }
                list.appendChild(btn);
            });
        }

        // Lives
        let MAX_LIVES = 3;
        let lives = MAX_LIVES;
        let isInvulnerable = false;
        let invulnerableTime = 0;

        // Level progression
        let level = 1;
        let tiesDestroyed = 0; // Level 1 & 2
        let sdsDestroyed = 0; // Level 2

        // Persistent stats for Skin unlocks
        let totalTiesTracker = parseInt(localStorage.getItem('swGame_totalTies')) || 0;
        let roundsCompletedTracker = parseInt(localStorage.getItem('swGame_roundsCompleted')) || 0;
        let selectedSkin = localStorage.getItem('swGame_selectedSkin') || 'X-Wing';

        let levelTransitionTime = 0;
        let isTransitioning = false;
        let transitionText1 = "";
        let transitionText2 = "";

        // Level 3 specific
        let trenchDistance = 0;
        let maxTrenchDistance = 5000;
        let exhaustPortVisible = false;
        let exhaustPortY = -100;

        const MAX_AMMO = 30;
        let ammo = MAX_AMMO;
        let lastAmmoSpawn = 0;

        // Keep track of which keys are pressed
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            Space: false
        };

        // Player config (X-Wing style)
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 60,
            width: 40,
            height: 40,
            speed: 7
        };

        const lasers = [];
        const enemyLasers = [];
        const enemies = [];
        const starDestroyers = [];
        const turrets = []; // Level 3
        const allies = [];
        const stars = [];
        const ammoDrops = []; // Stores ammo pickups
        const fireworks = []; // For celebration
        const shipExplosions = [];

        // Setup background stars for parallax effect
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 4 + 1
            });
        }

        function triggerTransition(nextLevel, msg1, msg2) {
            isTransitioning = true;
            levelTransitionTime = Date.now();
            transitionText1 = msg1;
            transitionText2 = msg2;

            // Clear current threats
            enemies.length = 0;
            enemyLasers.length = 0;
            starDestroyers.length = 0;
            turrets.length = 0;

            // Refill lives for the new section
            lives = MAX_LIVES;

            level = nextLevel;
        }

        function createExplosion(x, y, baseColor) {
            let numParticles = 20 + Math.random() * 20;
            let particles = [];
            for (let i = 0; i < numParticles; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 5 + 1;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1.0, // alpha
                    decay: Math.random() * 0.05 + 0.02,
                    size: Math.random() * 4 + 2
                });
            }
            shipExplosions.push({ particles: particles, color: baseColor });
        }

        function loseLife() {
            if (isInvulnerable || isGameOver || isGameWon || isTransitioning) return;

            createExplosion(player.x, player.y, '#ff8800');

            lives--;
            if (lives <= 0) {
                endGame();
            } else {
                // Flash / Respawn state
                isInvulnerable = true;
                invulnerableTime = Date.now();
                player.x = canvas.width / 2; // Move back to center
            }
        }

        // Input handling
        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') keys.ArrowLeft = true;
            if (e.code === 'ArrowRight') keys.ArrowRight = true;
            if (e.code === 'Space') {
                if (!keys.Space) shoot(); // trigger once per press
                keys.Space = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft') keys.ArrowLeft = false;
            if (e.code === 'ArrowRight') keys.ArrowRight = false;
            if (e.code === 'Space') keys.Space = false;
        });

        restartBtn.addEventListener('click', resetGame);

        let lastShotTime = 0;
        function updateAmmoUI() {
            const percentage = Math.max(0, (ammo / MAX_AMMO) * 100);
            ammoBar.style.width = percentage + '%';
            if (percentage < 30) {
                ammoBar.style.backgroundColor = '#ff3333'; // Red when low
            } else if (percentage < 60) {
                ammoBar.style.backgroundColor = '#ff9900'; // Orange when medium
            } else {
                ammoBar.style.backgroundColor = '#00ff00'; // Green when high
            }
        }

        function shoot() {
            if (isGameOver || ammo <= 0 || isTransitioning || isGameWon) return;
            const now = Date.now();
            if (now - lastShotTime > 250) { // limit fire rate
                // Dual blasters (Rebel green)
                lasers.push({ x: player.x - 18, y: player.y, width: 4, height: 18, speed: 15, color: '#00ff00', isAlly: true });
                lasers.push({ x: player.x + 18, y: player.y, width: 4, height: 18, speed: 15, color: '#00ff00', isAlly: true });
                lastShotTime = now;
                ammo--;
                updateAmmoUI();
            }
        }

        let lastStarDestroyerSpawn = 0;
        let lastAllyFire = 0;
        let lastTurretSpawn = 0;

        function spawnEnemy(now) {
            if (isGameOver || isTransitioning || isGameWon) return;

            // Level 3: Trench Run Spawns
            if (level === 3) {
                if (!exhaustPortVisible && now - lastTurretSpawn > 1000) {
                    // Spawn turrets on the walls (left or right side of canvas)
                    const isLeft = Math.random() > 0.5;
                    turrets.push({
                        x: isLeft ? 60 : canvas.width - 60,
                        y: -50,
                        width: 30,
                        height: 30,
                        speed: 5,
                        hp: 3,
                        lastFire: now,
                        isLeft: isLeft
                    });
                    lastTurretSpawn = now;
                }

                // Spawn occasional TIE in trench
                if (!exhaustPortVisible && now - lastEnemySpawn > 2500) {
                    const x = Math.random() * (canvas.width - 300) + 150; // Central trench area
                    enemies.push({
                        x: x,
                        y: -50,
                        width: 40,
                        height: 40,
                        speed: 4,
                        hp: 1
                    });
                    lastEnemySpawn = now;
                }
            } else {
                // Level 1 & 2: TIE Spawns
                if (now - lastEnemySpawn > enemySpawnRate) {
                    const x = Math.random() * (canvas.width - 60) + 30;

                    // Base speed depends on level
                    let baseSpeed = 3;
                    let speedVariance = 3;
                    let speedScale = 0.05;

                    if (level === 2) {
                        // Halfway between original TIE speed (3 min) and Star Destroyer speed (1.5)
                        baseSpeed = 2.0;
                        speedVariance = 1.0;
                        speedScale = 0.02; // Scale slower over time in level 2
                    }

                    enemies.push({
                        x: x,
                        y: -50,
                        width: 40,
                        height: 40,
                        speed: baseSpeed + Math.random() * speedVariance + (score * speedScale),
                        hp: 1 // TIEs die in 1 hit
                    });
                    lastEnemySpawn = now;
                    // Decrease spawn rate to make it harder, down to 400ms min
                    enemySpawnRate = Math.max(400, 1500 - (score * 15));
                }

                // LEVEL 2 LOGIC: Star Destroyers
                if (level === 2) {
                    // Spawn Star Destroyers occasionally
                    if (now - lastStarDestroyerSpawn > 6000 + Math.random() * 4000) { // Every 6-10s
                        const x = Math.random() * (canvas.width - 200) + 100;
                        starDestroyers.push({
                            x: x,
                            y: -150,
                            width: 140,
                            height: 200,
                            speed: 1.5,
                            hp: 15, // Takes 15 hits to destroy
                            lastFire: now
                        });
                        lastStarDestroyerSpawn = now;
                    }
                }
            }

            // Spawn ammo drop occasionally
            if (now - lastAmmoSpawn > 8000 + Math.random() * 5000) { // random every 8-13 seconds
                const dropX = Math.random() * (canvas.width - 60) + 30;
                ammoDrops.push({
                    x: dropX,
                    y: -30,
                    width: 25,
                    height: 25,
                    speed: 2.5
                });
                lastAmmoSpawn = now;
            }
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);

            if (selectedSkin === 'TIE Fighter') {
                // Solar panels (Hexagon mesh)
                ctx.fillStyle = '#111'; ctx.strokeStyle = '#666'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(-25, -20); ctx.lineTo(-20, -25); ctx.lineTo(-20, 25); ctx.lineTo(-25, 20); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(25, -20); ctx.lineTo(20, -25); ctx.lineTo(20, 25); ctx.lineTo(25, 20); ctx.closePath(); ctx.fill(); ctx.stroke();
                // Connectors
                let strutGrad = ctx.createLinearGradient(0, -5, 0, 5);
                strutGrad.addColorStop(0, '#555'); strutGrad.addColorStop(0.5, '#999'); strutGrad.addColorStop(1, '#333');
                ctx.fillStyle = strutGrad; ctx.fillRect(-20, -4, 40, 8);
                // Cockpit pod
                let podGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, 14);
                podGrad.addColorStop(0, '#999'); podGrad.addColorStop(1, '#333');
                ctx.fillStyle = podGrad; ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.fill();
                // Window
                ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.beginPath();
                ctx.moveTo(0, -8); ctx.lineTo(0, 8); ctx.moveTo(-8, 0); ctx.lineTo(8, 0);
                ctx.moveTo(-6, -6); ctx.lineTo(6, 6); ctx.moveTo(-6, 6); ctx.lineTo(6, -6); ctx.stroke();

            } else if (selectedSkin === 'Millennium Falcon') {
                // Base Hull Gradient
                let hullGrad = ctx.createRadialGradient(0, 5, 5, 0, 5, 22);
                hullGrad.addColorStop(0, '#e5e5e5');
                hullGrad.addColorStop(1, '#aaaaaa');
                ctx.fillStyle = hullGrad;
                ctx.strokeStyle = '#777';
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(0, 5, 20, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); // Main saucer

                // Hull Panels (Details)
                ctx.beginPath(); ctx.arc(0, 5, 12, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, -7); ctx.lineTo(0, -15); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(-18, -3); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(18, -3); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-8, 12); ctx.lineTo(-15, 16); ctx.stroke();

                // Mandibles
                ctx.fillStyle = '#d5d5d5';
                ctx.beginPath(); ctx.moveTo(-4, -5); ctx.lineTo(-14, -28); ctx.lineTo(-6, -28); ctx.lineTo(0, -12); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(4, -5); ctx.lineTo(14, -28); ctx.lineTo(6, -28); ctx.lineTo(0, -12); ctx.closePath(); ctx.fill(); ctx.stroke();

                // Mandible details
                ctx.fillStyle = '#b03030'; // Red markings
                ctx.fillRect(-12, -22, 6, 2);
                ctx.fillRect(6, -22, 6, 2);

                // Cockpit tube
                ctx.fillStyle = '#d5d5d5';
                ctx.beginPath(); ctx.moveTo(15, 0); ctx.lineTo(28, -6); ctx.lineTo(31, -1); ctx.lineTo(17, 10); ctx.fill(); ctx.stroke();

                // Cockpit

        function drawTurret(t) {
            ctx.save();
            ctx.translate(t.x, t.y);

            ctx.fillStyle = '#444';

            ctx.strokeStyle = '#222';
            ctx.strokeRect(-18, -18, 36, 36);

            // Inner rotating plate
            ctx.fillStyle = '#666';
            ctx.beginPath();
            ctx.arc(0, 0, 14, 0, Math.PI * 2);
            ctx.fill();

            // Calculate angle to player for the barrels
            let dx = player.x - t.x;
            let dy = player.y - t.y;
            let angle = Math.atan2(dy, dx);

            ctx.rotate(angle - Math.PI / 2); // Turret points "up" locally but rotates

            // Gun barrels (dual heavy cannons)
            let barrelGrad = ctx.createLinearGradient(-8, 0, 8, 0);
            barrelGrad.addColorStop(0, '#555');
            barrelGrad.addColorStop(0.5, '#bbb');
            barrelGrad.addColorStop(1, '#555');
            ctx.fillStyle = barrelGrad;

            ctx.fillRect(-6, 0, 4, 25);
            ctx.fillRect(2, 0, 4, 25);

            // Cannon tips
            ctx.fillStyle = '#222';
            ctx.fillRect(-7, 20, 6, 5);
            ctx.fillRect(1, 20, 6, 5);

            // Dome top
            let domeGrad = ctx.createRadialGradient(-2, -2, 2, 0, 0, 10);
            domeGrad.addColorStop(0, '#aaa');
            domeGrad.addColorStop(1, '#333');
            ctx.fillStyle = domeGrad;

            ctx.beginPath();
            ctx.arc(0, 0, 10, 0, Math.PI * 2);

            // Warning lights

        function drawExhaustPort() {
            ctx.save();

            ctx.fillStyle = '#333';
            ctx.fillRect(-100, -50, 200, 100);

            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2;
            for (let i = -100; i <= 100; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, -50);
                ctx.lineTo(i, 50);
                ctx.stroke();
            }

            // The actual port (target) - Outer ring
            ctx.fillStyle = '#444';
            ctx.beginPath();
            ctx.arc(0, 0, 35, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Inner darkness (the shaft)

            holeGrad.addColorStop(1, '#222');

            ctx.strokeStyle = '#ffcc00';

            ctx.setLineDash([8, 8]);
            ctx.beginPath();
            ctx.arc(0, 0, 30, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);

            // Ray-shield inner glow
            ctx.fillStyle = '#ff3333';
            ctx.globalAlpha = 0.3 + Math.sin(Date.now() / 100) * 0.2; // Pulsing
            ctx.beginPath();
            ctx.arc(0, 0, 24, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;

            // Targeting box if player is aligned
            if (player.x > canvas.width / 2 - 25 && player.x < canvas.width / 2 + 25) {
                ctx.strokeStyle = '#ff3333';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff0000';

                ctx.moveTo(40, 25); ctx.lineTo(40, 40); ctx.lineTo(25, 40);
                // Bottom left
                ctx.moveTo(-25, 40); ctx.lineTo(-40, 40); ctx.lineTo(-40, 25);

        function update() {
            const now = Date.now();

            if (isCelebrating) {
                // Show Skip Button after 7 seconds
                if (now - celebrationStartTime > 7000) {
                    skipBtn.style.display = 'block';
                }

                // Update fireworks for 30 seconds
                if (now - celebrationStartTime < 30000) {
                    if (Math.random() < 0.1) {
                        fireworks.push({
                            x: Math.random() * canvas.width,
                            y: canvas.height,
                            targetY: Math.random() * (canvas.height / 2),
                            color: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'][Math.floor(Math.random() * 5)],
                            exploded: false,
                            particles: []
                        });
                    }

                    for (let i = fireworks.length - 1; i >= 0; i--) {
                        let fw = fireworks[i];
                        if (!fw.exploded) {
                            fw.y -= 5;
                            if (fw.y <= fw.targetY) {
                                fw.exploded = true;
                                for (let j = 0; j < 30; j++) {
                                    let angle = Math.random() * Math.PI * 2;
                                    let speed = Math.random() * 3 + 1;
                                    fw.particles.push({
                                        x: fw.x,
                                        y: fw.y,
                                        vx: Math.cos(angle) * speed,
                                        vy: Math.sin(angle) * speed,
                                        alpha: 1
                                    });
                                }
                            }
                        } else {
                            for (let j = fw.particles.length - 1; j >= 0; j--) {
                                let p = fw.particles[j];
                                p.x += p.vx;
                                p.y += p.vy;
                                p.vy += 0.05; // gravity
                                p.alpha -= 0.02;
                                if (p.alpha <= 0) {
                                    fw.particles.splice(j, 1);
                                }
                            }
                            if (fw.particles.length === 0) {
                                fireworks.splice(i, 1);
                            }
                        }
                    }
                } else {
                    // Celebration over
                    finishCelebration();
                }
                return; // Skip normal game update
            }

            if (isGameOver || isGameWon) return;

            // Invulnerability timer
            if (isInvulnerable && now - invulnerableTime > 2000) {
                isInvulnerable = false;
            }

            // Level Transition Logic
            if (level === 1 && tiesDestroyed >= 7 && !isTransitioning) {
                tiesDestroyed = 0; // reset for next phase counting
                triggerTransition(2, "HYPERSPACE JUMP ACTIVATED", "Approaching Imperial Fleet...");
            }
            else if (level === 2 && tiesDestroyed >= 8 && sdsDestroyed >= 2 && !isTransitioning) {
                triggerTransition(3, "APPROACHING DEATH STAR", "Commence Trench Run!");
            }

            if (isTransitioning) {
                if (now - levelTransitionTime > 3000) {
                    isTransitioning = false;

                    if (level === 2) {
                        enemySpawnRate = 1200;
                        allies.push({ x: player.x - 100, y: player.y + 20, offsetX: -100, offsetY: 20 });
                        allies.push({ x: player.x + 100, y: player.y + 20, offsetX: 100, offsetY: 20 });

                        // FIX: Ensure tiesDestroyed starts strictly at 0 for level 2 so we don't instantly jump to level 3.
                        tiesDestroyed = 0;
                    } else if (level === 3) {
                        // Enter trench
                        allies.length = 0; // Allies break off
                        starDestroyers.length = 0;
                        trenchDistance = 0;
                        exhaustPortVisible = false;
                        exhaustPortY = -100;
                    }
                }
            }

            // Level 3 Mechanics
            if (level === 3 && !isTransitioning) {
                trenchDistance += 5; // move forward in trench
                if (trenchDistance > maxTrenchDistance && !exhaustPortVisible) {
                    exhaustPortVisible = true;
                    // Stop spawning turrets
                }

                if (exhaustPortVisible) {
                    exhaustPortY += 2; // Port moves down screen slowly
                    if (exhaustPortY > canvas.height + 50) {
                        // Missed the port!
                        loseLife();
                        // Reset run slightly
                        exhaustPortVisible = false;
                        exhaustPortY = -100;
                        trenchDistance = maxTrenchDistance - 1000;
                    }
                }
            }

            // Move player
            if (keys.ArrowLeft && player.x > (level === 3 ? 130 : 30)) { // Narrower path in trench
                player.x -= player.speed;
            }
            if (keys.ArrowRight && player.x < (level === 3 ? canvas.width - 130 : canvas.width - 30)) { // Narrower path in trench
                player.x += player.speed;
            }

            // Move Allies
            allies.forEach(ally => {
                // Follow player loosely
                ally.x += (player.x + ally.offsetX - ally.x) * 0.05;
                ally.y += (player.y + ally.offsetY - ally.y) * 0.05;

                // Ally shooting
                if (now - lastAllyFire > 800) { // Allies shoot slower
                    lasers.push({ x: ally.x - 18, y: ally.y, width: 4, height: 18, speed: 15, color: '#00ff00', isAlly: true });
                    lasers.push({ x: ally.x + 18, y: ally.y, width: 4, height: 18, speed: 15, color: '#00ff00', isAlly: true });
                }
            });
            if (now - lastAllyFire > 800) lastAllyFire = now;

            // Spawn mechanics
            spawnEnemy(now);

            // Update stars / background
            if (level !== 3) {
                stars.forEach(s => {
                    s.y += (level === 2 ? s.speed * 2 : s.speed); // Stars move faster in fleet battle
                    if (s.y > canvas.height) {
                        s.y = 0;
                        s.x = Math.random() * canvas.width;
                    }
                });
            }

            // Update player lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].y -= lasers[i].speed;

                // Level 3: Check exhaust port hit
                if (level === 3 && exhaustPortVisible &&
                    lasers[i].x > canvas.width / 2 - 25 && lasers[i].x < canvas.width / 2 + 25 &&
                    lasers[i].y > exhaustPortY - 25 && lasers[i].y < exhaustPortY + 25) {

                    winGame();
                    return;
                }

                if (lasers[i].y < -20) {
                    lasers.splice(i, 1);
                }
            }

            // Update enemy lasers
            for (let i = enemyLasers.length - 1; i >= 0; i--) {
                enemyLasers[i].y += enemyLasers[i].speed;
                // Add slight X movement for turret lasers targeting player
                if (enemyLasers[i].vx) {
                    enemyLasers[i].x += enemyLasers[i].vx;
                }

                // Hit player?
                if (!isTransitioning && !isInvulnerable &&
                    enemyLasers[i].x > player.x - 20 && enemyLasers[i].x < player.x + 20 &&
                    enemyLasers[i].y > player.y - 20 && enemyLasers[i].y < player.y + 20) {
                    loseLife();
                    enemyLasers.splice(i, 1);
                    continue;
                }

                if (enemyLasers[i].y > canvas.height + 20) {
                    enemyLasers.splice(i, 1);
                }
            }

            // Update ammo drops
            for (let i = ammoDrops.length - 1; i >= 0; i--) {
                const drop = ammoDrops[i];
                drop.y += drop.speed;

                // Collision with player
                const dx = drop.x - player.x;
                const dy = drop.y - player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 40) { // Picked up ammo
                    ammoDrops.splice(i, 1);
                    ammo = Math.min(MAX_AMMO, ammo + 10); // Restore 10 ammo, don't exceed max
                    updateAmmoUI();
                    score += 5; // Bonus points
                    scoreVal.innerText = score;
                    continue;
                }

                // Passed off screen
                if (drop.y > canvas.height + 30) {
                    ammoDrops.splice(i, 1);
                }
            }

            // Update enemies & collision
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.y += e.speed;

                // Collision with player
                if (!isTransitioning && !isInvulnerable) {
                    const dx = e.x - player.x;
                    const dy = e.y - player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 35) { // Hit radius
                        loseLife();
                        createExplosion(e.x, e.y, '#ffaa00');
                        enemies.splice(i, 1);
                        continue;
                    }
                }

                // Passed off screen
                if (e.y > canvas.height + 30) {
                    enemies.splice(i, 1);
                    score = Math.max(0, score - 5); // Penalty
                    scoreVal.innerText = score;
                }
            }

            // Update Turrets (Level 3)
            for (let i = turrets.length - 1; i >= 0; i--) {
                const t = turrets[i];
                t.y += t.speed;

                // Turret shoots at player (Faster fire rate, better tracking)
                if (now - t.lastFire > 600) {
                    let dx = player.x - t.x;
                    let dy = player.y - t.y;
                    let mag = Math.sqrt(dx * dx + dy * dy);

                    enemyLasers.push({
                        x: t.x,
                        y: t.y + 15,
                        width: 5,
                        height: 15,
                        speed: 10,  // Faster lasers
                        vx: (dx / mag) * 7.5, // Better horizontal tracking
                        color: '#ff3333'
                    });
                    t.lastFire = now;
                }

                // Crash into Turret (shouldn't really happen on walls but just in case)
                if (!isTransitioning && !isInvulnerable &&
                    player.x > t.x - 25 && player.x < t.x + 25 &&
                    player.y > t.y - 25 && player.y < t.y + 25) {
                    loseLife();
                    createExplosion(t.x, t.y, '#ff4400');
                    turrets.splice(i, 1);
                    continue;
                }

                if (t.y > canvas.height + 50) {
                    turrets.splice(i, 1);
                }
            }

            // Update Star Destroyers
            for (let i = starDestroyers.length - 1; i >= 0; i--) {
                const sd = starDestroyers[i];
                sd.y += sd.speed;

                // Star Destroyer shoots at player
                if (now - sd.lastFire > 1500) {
                    // Turbolasers (Imperial red)
                    enemyLasers.push({ x: sd.x - 40, y: sd.y + 80, width: 6, height: 25, speed: 10, color: '#ff3333' });
                    enemyLasers.push({ x: sd.x + 40, y: sd.y + 80, width: 6, height: 25, speed: 10, color: '#ff3333' });
                    sd.lastFire = now;
                }

                // Crash into SD
                if (!isTransitioning && !isInvulnerable &&
                    player.x > sd.x - 70 && player.x < sd.x + 70 &&
                    player.y > sd.y - 100 && player.y < sd.y + 100) {
                    loseLife();
                    createExplosion(sd.x, sd.y + 50, '#ffaa00');
                    // Knock player back
                    player.y += 50;
                    continue;
                }

                if (sd.y > canvas.height + 150) {
                    starDestroyers.splice(i, 1);
                }
            }

            // Collision: Lasers vs Enemies (TIEs)
            for (let i = enemies.length - 1; i >= 0; i--) {
                for (let j = lasers.length - 1; j >= 0; j--) {
                    const e = enemies[i];
                    const l = lasers[j];
                    if (e && l && l.isAlly) { // Any green laser
                        // Rough bounding box collision
                        if (l.x > e.x - 25 && l.x < e.x + 25 &&
                            l.y > e.y - 20 && l.y < e.y + 20) {

                            // Hit!
                            createExplosion(e.x, e.y, '#ffaa00');
                            enemies.splice(i, 1);
                            lasers.splice(j, 1);
                            score += 10;

                            if (level === 1 || level === 2) {
                                tiesDestroyed++;
                            }
                            // Global stats tracking for unlocks
                            totalTiesTracker++;
                            localStorage.setItem('swGame_totalTies', totalTiesTracker);
                            updateSkinsMenu(); // Refresh UI if open

                            scoreVal.innerText = score;
                            break; // go to next enemy
                        }
                    }
                }
            }

            // Collision: Lasers vs Turrets (Level 3)
            for (let i = turrets.length - 1; i >= 0; i--) {
                for (let j = lasers.length - 1; j >= 0; j--) {
                    const t = turrets[i];
                    const l = lasers[j];
                    if (t && l && l.isAlly) {
                        if (l.x > t.x - 20 && l.x < t.x + 20 &&
                            l.y > t.y - 20 && l.y < t.y + 20) {

                            lasers.splice(j, 1);
                            t.hp--;
                            if (t.hp <= 0) {
                                createExplosion(t.x, t.y, '#ff4400');
                                turrets.splice(i, 1);
                                score += 50;
                                scoreVal.innerText = score;
                                break;
                            }
                        }
                    }
                }
            }

            // Collision: Lasers vs Star Destroyers
            for (let i = starDestroyers.length - 1; i >= 0; i--) {
                for (let j = lasers.length - 1; j >= 0; j--) {
                    const sd = starDestroyers[i];
                    const l = lasers[j];
                    if (sd && l && l.isAlly) {
                        // Rough bounding box around the wedge
                        if (l.x > sd.x - 70 && l.x < sd.x + 70 &&
                            l.y > sd.y - 100 && l.y < sd.y + 100) {

                            lasers.splice(j, 1);
                            sd.hp--;

                            if (sd.hp <= 0) {
                                createExplosion(sd.x, sd.y, '#ff6600');
                                starDestroyers.splice(i, 1);
                                score += 250;
                                sdsDestroyed++;
                                scoreVal.innerText = score;
                                break;
                            }
                        }
                    }
                }
            }

            // Update ship explosions
            for (let i = shipExplosions.length - 1; i >= 0; i--) {
                const ex = shipExplosions[i];
                for (let j = ex.particles.length - 1; j >= 0; j--) {
                    let p = ex.particles[j];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    if (p.life <= 0) {
                        ex.particles.splice(j, 1);
                    }
                }
                if (ex.particles.length === 0) {
                    shipExplosions.splice(i, 1);
                }
            }
        }

        function draw() {
            // Clear canvas background
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isCelebrating) {
                // Draw celebration scene (Yavin 4 / Endor vibes)
                // Sky
                let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, "#000022");
                gradient.addColorStop(1, "#003300");
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw fireworks
                fireworks.forEach(fw => {
                    if (!fw.exploded) {
                        ctx.fillStyle = fw.color;
                        ctx.beginPath();
                        ctx.arc(fw.x, fw.y, 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        fw.particles.forEach(p => {
                            ctx.fillStyle = fw.color;
                            ctx.globalAlpha = p.alpha;
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                            ctx.fill();
                        });
                        ctx.globalAlpha = 1.0;
                    }
                });

                // Draw Temple/Trees Silhouette
                ctx.fillStyle = '#001100';
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                ctx.lineTo(0, canvas.height - 150);
                ctx.lineTo(100, canvas.height - 200);
                ctx.lineTo(200, canvas.height - 130);
                ctx.lineTo(300, canvas.height - 250);
                ctx.lineTo(400, canvas.height - 170);
                ctx.lineTo(500, canvas.height - 230);
                ctx.lineTo(600, canvas.height - 140);
                ctx.lineTo(700, canvas.height - 210);
                ctx.lineTo(800, canvas.height - 150);
                ctx.lineTo(800, canvas.height);
                ctx.fill();

                // Draw Heroes (Higher up to not get cut off)
                const baseHeight = canvas.height - 90;

                // Realistic Vector Characters
                // Luke
                ctx.save();
                ctx.translate(canvas.width / 2 - 40, baseHeight - 40);
                // Head
                ctx.fillStyle = '#ffcc99';
                ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
                // Hair
                ctx.fillStyle = '#eedd88';
                ctx.beginPath(); ctx.arc(0, -2, 8.5, Math.PI, 0); ctx.fill();
                // Body (Tunic)
                ctx.fillStyle = '#eeeeee';
                ctx.beginPath(); ctx.moveTo(-6, 8); ctx.lineTo(6, 8); ctx.lineTo(8, 30); ctx.lineTo(-8, 30); ctx.fill();
                // Arms
                ctx.fillStyle = '#eeddcc';
                ctx.fillRect(-10, 8, 4, 15); ctx.fillRect(6, 8, 4, 15);
                // Belt
                ctx.fillStyle = '#553311';
                ctx.fillRect(-7, 20, 14, 3);
                // Legs
                ctx.fillStyle = '#eeddcc';
                ctx.fillRect(-6, 30, 4, 15); ctx.fillRect(2, 30, 4, 15);
                ctx.restore();

                // Leia
                ctx.save();
                ctx.translate(canvas.width / 2 - 10, baseHeight - 35);
                // Head
                ctx.fillStyle = '#ffcc99';
                ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.fill();
                // Hair Buns
                ctx.fillStyle = '#331100';
                ctx.beginPath(); ctx.arc(-8, 0, 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(8, 0, 4, 0, Math.PI * 2); ctx.fill();
                // Hair Top
                ctx.beginPath(); ctx.arc(0, -2, 7.5, Math.PI, 0); ctx.fill();
                // Dress
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.moveTo(-5, 7); ctx.lineTo(5, 7); ctx.lineTo(9, 40); ctx.lineTo(-9, 40); ctx.fill();
                // Arms
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(-9, 7, 4, 14); ctx.fillRect(5, 7, 4, 14);
                // Silver Belt
                ctx.fillStyle = '#cccccc';
                ctx.fillRect(-6, 20, 12, 2);
                ctx.restore();

                // Han
                ctx.save();
                ctx.translate(canvas.width / 2 + 20, baseHeight - 40);
                // Head
                ctx.fillStyle = '#ffcc99';
                ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
                // Hair
                ctx.fillStyle = '#442211';
                ctx.beginPath(); ctx.arc(0, -2, 8.5, Math.PI, 0); ctx.fill();
                // Shirt
                ctx.fillStyle = '#eeeeee';
                ctx.fillRect(-6, 8, 12, 15);
                // Vest
                ctx.fillStyle = '#111111';
                ctx.fillRect(-7, 8, 4, 15); ctx.fillRect(3, 8, 4, 15);
                // Arms
                ctx.fillStyle = '#eeeeee';
                ctx.fillRect(-11, 8, 4, 15); ctx.fillRect(7, 8, 4, 15);
                // Pants
                ctx.fillStyle = '#223355';
                ctx.fillRect(-6, 23, 5, 22); ctx.fillRect(1, 23, 5, 22);
                // Holster
                ctx.fillStyle = '#553311';
                ctx.fillRect(4, 25, 4, 8);
                ctx.restore();

                // Chewie
                ctx.save();
                ctx.translate(canvas.width / 2 + 50, baseHeight - 45);
                // Body/Head (Hairy)
                ctx.fillStyle = '#663311';
                ctx.beginPath(); ctx.arc(0, -5, 9, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.moveTo(-9, -5); ctx.lineTo(9, -5); ctx.lineTo(11, 35); ctx.lineTo(-11, 35); ctx.fill();
                // Arms
                ctx.fillStyle = '#663311';
                ctx.fillRect(-14, 0, 5, 20); ctx.fillRect(9, 0, 5, 20);
                // Legs
                ctx.fillRect(-10, 35, 7, 15); ctx.fillRect(3, 35, 7, 15);
                // Bandolier
                ctx.strokeStyle = '#221100'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(8, 25); ctx.stroke();
                // Silver accents
                ctx.fillStyle = '#aaaaaa';
                for (let i = 0; i < 5; i++) { ctx.fillRect(-6 + i * 3, 2 + i * 4.5, 4, 2); }
                ctx.restore();

                // C3PO
                ctx.save();
                ctx.translate(canvas.width / 2 - 70, baseHeight - 40);
                let gold = ctx.createLinearGradient(-5, 0, 5, 0);
                gold.addColorStop(0, '#cca822'); gold.addColorStop(0.5, '#ffee55'); gold.addColorStop(1, '#cca822');
                ctx.fillStyle = gold;
                // Head
                ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.fill();
                // Eyes
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-3, -1, 1.5, 0, Math.PI * 2); ctx.arc(3, -1, 1.5, 0, Math.PI * 2); ctx.fill();
                // Body
                ctx.fillStyle = gold;
                ctx.fillRect(-6, 7, 12, 18);
                // Arms
                ctx.fillRect(-9, 7, 3, 15); ctx.fillRect(6, 7, 3, 15);
                // Midriff wires
                ctx.fillStyle = '#333'; ctx.fillRect(-5, 20, 10, 4);
                // Legs
                ctx.fillStyle = gold;
                ctx.fillRect(-5, 25, 4, 20);
                // One silver leg
                ctx.fillStyle = '#cccccc'; ctx.fillRect(1, 25, 4, 20);
                ctx.restore();

                // R2D2
                ctx.save();
                ctx.translate(canvas.width / 2 - 100, baseHeight - 20);
                // Body
                ctx.fillStyle = '#eeeeee';
                ctx.fillRect(-8, 5, 16, 15);
                // Dome
                let domeNode = ctx.createLinearGradient(-8, 0, 8, 0);
                domeNode.addColorStop(0, '#999'); domeNode.addColorStop(0.5, '#eee'); domeNode.addColorStop(1, '#999');
                ctx.fillStyle = domeNode;
                ctx.beginPath(); ctx.arc(0, 5, 8, Math.PI, 0); ctx.fill();
                // Blue details
                ctx.fillStyle = '#2244aa';
                ctx.fillRect(-8, 3, 16, 2);
                ctx.fillRect(-4, -1, 3, 3);
                // Legs
                ctx.fillStyle = '#dddddd';
                ctx.fillRect(-11, 5, 4, 15); ctx.fillRect(7, 5, 4, 15);
                ctx.restore();

                ctx.fillStyle = '#ffe81f';
                ctx.font = '40px Courier New';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ffe81f';
                ctx.fillText("THE GALAXY IS SAVED.", canvas.width / 2, 100);
                ctx.font = '20px Courier New';
                ctx.fillText("MAY THE FORCE BE WITH YOU.", canvas.width / 2, 150);
                ctx.shadowBlur = 0;
                return;
            }

            if (level === 3) {
                // Draw Trench Background
                ctx.fillStyle = '#444'; // Base grey
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Walls
                ctx.fillStyle = '#222';
                ctx.fillRect(0, 0, 100, canvas.height); // Left wall
                ctx.fillRect(canvas.width - 100, 0, 100, canvas.height); // Right wall

                // Moving surface lines (simulate speed)
                ctx.strokeStyle = '#111';
                ctx.lineWidth = 2;
                let offset = (Date.now() / 10) % 50;
                for (let y = offset; y < canvas.height; y += 50) {
                    ctx.beginPath();
                    // Floor lines
                    ctx.moveTo(100, y);
                    ctx.lineTo(canvas.width - 100, y);
                    ctx.stroke();
                }

                if (exhaustPortVisible) {
                    drawExhaustPort();
                }

            } else {
                // Draw stars with cinematic depth
                stars.forEach(s => {
                    // Random star colors (White, bluish, gold-ish)
                    let starColors = ['#ffffff', '#ffffff', '#ccddff', '#ffddbb'];
                    let colorIdx = Math.floor(Math.sin(s.x * s.y) * 4);
                    if (colorIdx < 0) colorIdx = 0;
                    if (colorIdx > 3) colorIdx = 3;

                    ctx.fillStyle = starColors[colorIdx];
                    ctx.shadowBlur = s.size > 1.5 ? 4 : 0; // Only larger stars glow
                    ctx.shadowColor = ctx.fillStyle;

                    ctx.globalAlpha = Math.random() * 0.5 + 0.5; // Twinkle effect
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.shadowBlur = 0;
                });
                ctx.globalAlpha = 1.0; // Reset alpha
            }

            // Draw player/ally lasers (Cinematic Blast)
            lasers.forEach(l => {
                ctx.fillStyle = '#ffffff'; // Blinding white core
                ctx.shadowBlur = 15;
                ctx.shadowColor = l.color; // Colored bloom (usually green/red)

                // Outer glow
                ctx.fillRect(l.x - l.width / 2, l.y, l.width, l.height);
                // Inner core
                ctx.fillRect(l.x - (l.width / 2) + 1, l.y, l.width - 2, l.height);

                ctx.shadowBlur = 0;
            });

            // Draw enemy lasers
            enemyLasers.forEach(l => {
                ctx.fillStyle = '#ffffff'; // White core
                ctx.shadowBlur = 15;
                ctx.shadowColor = l.color; // Colored bloom

                ctx.fillRect(l.x - l.width / 2, l.y, l.width, l.height);
                ctx.fillRect(l.x - (l.width / 2) + 1, l.y, l.width - 2, l.height);

                ctx.shadowBlur = 0;
            });

            // Draw ship explosions
            shipExplosions.forEach(ex => {
                ex.particles.forEach(p => {
                    ctx.fillStyle = ex.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = ex.color;
                    ctx.globalAlpha = p.life < 0 ? 0 : p.life;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.shadowBlur = 0;
            });
            ctx.globalAlpha = 1.0;

            // Draw Star Destroyers
            starDestroyers.forEach(sd => {
                drawStarDestroyer(sd);
            });

            // Draw Turrets
            turrets.forEach(t => {
                drawTurret(t);
            });

            // Draw enemies
            enemies.forEach(e => {
                drawEnemy(e);
            });

            // Draw ammo drops
            ammoDrops.forEach(drop => {
                drawAmmoDrop(drop);
            });

            // Draw player
            if (!isGameOver && !isGameWon) {
                // If transitioning, blink player or show warp effect
                if (isTransitioning) {
                    ctx.globalAlpha = Math.sin(Date.now() / 100) * 0.5 + 0.5;
                } else if (isInvulnerable) { // Blink damaged
                    ctx.globalAlpha = Math.sin(Date.now() / 50) * 0.5 + 0.5;
                }

                drawPlayer();
                ctx.globalAlpha = 1.0;

                // Draw allies
                allies.forEach(ally => {
                    ctx.save();
                    // Move canvas to ally pos, shift it up slightly so it looks the same
                    ctx.translate(ally.x - player.x, ally.y - player.y);
                    drawPlayer();
                    ctx.restore();
                });
            }

            // Draw UI Messages
            // Lives
            ctx.fillStyle = '#00ff00';
            ctx.font = '20px Courier New';
            ctx.textAlign = 'right';
            ctx.fillText(`LIVES: ${lives}`, canvas.width - 20, 50);

            if (isTransitioning) {
                ctx.fillStyle = '#fff';
                ctx.font = '36px Courier New';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#fff';
                ctx.fillText(transitionText1, canvas.width / 2, canvas.height / 2);
                ctx.font = '24px Courier New';
                ctx.fillText(transitionText2, canvas.width / 2, canvas.height / 2 + 40);
                ctx.shadowBlur = 0;
            } else if (level === 1) {
                ctx.fillStyle = '#aaa';
                ctx.font = '16px Courier New';
                ctx.textAlign = 'right';
                ctx.fillText(`Jump Drive Charging: ${tiesDestroyed}/7`, canvas.width - 20, 75);
            } else if (level === 2) {
                ctx.fillStyle = '#ff3333';
                ctx.font = '16px Courier New';
                ctx.textAlign = 'right';
                ctx.fillText(`SD: ${sdsDestroyed}/2 | TIE: ${tiesDestroyed}/8`, canvas.width - 20, 75);
            } else if (level === 3 && exhaustPortVisible) {
                ctx.fillStyle = '#ff0000';
                ctx.font = '24px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText("FIRE AT THE EXHAUST PORT!", canvas.width / 2, 80);
            }
        }

        function loop() {
            if (gameStarted) {
                update();
            }
            draw();
            if (!isGameOver && (!isGameWon || isCelebrating)) {
                animationId = requestAnimationFrame(loop);
            }
        }

        function endGame() {
            isGameOver = true;
            introAudio.pause();
            introAudio.currentTime = 0;
            gameOverScreen.style.display = 'block';
            gameOverScreen.querySelector('h2').innerText = "GAME OVER";
            gameOverScreen.querySelector('p').innerText = "The Empire Got You.";
            finalScore.innerText = score;
            restartBtn.innerText = "PLAY AGAIN";
        }

        function winGame() {
            isGameWon = true;
            isCelebrating = true;
            celebrationStartTime = Date.now();
            score += 1000; // Mass bonus

            introAudio.pause();
            introAudio.currentTime = 0;

            // Track global win for skins
            roundsCompletedTracker++;
            localStorage.setItem('swGame_roundsCompleted', roundsCompletedTracker);
            updateSkinsMenu(); // Refresh UI

            // Hide game over screen temporarily, let celebration run
            gameOverScreen.style.display = 'none';
            skipBtn.style.display = 'none'; // Ensure hidden at start

            // Play audio
            winAudio.currentTime = 0;
            winAudio.play().catch(e => console.log("Audio play failed:", e));

            gameOverScreen.querySelector('h2').innerText = "VICTORY!";
            gameOverScreen.querySelector('h2').style.color = "#00ff00";
            gameOverScreen.querySelector('h2').style.textShadow = "0 0 10px #00ff00";
            gameOverScreen.querySelector('p').innerText = "The Death Star is destroyed!";
            finalScore.innerText = score;
            restartBtn.innerText = "PLAY AGAIN";
        }

        function finishCelebration() {
            isCelebrating = false;
            winAudio.pause();
            winAudio.currentTime = 0;
            skipBtn.style.display = 'none';
            gameOverScreen.style.display = 'block'; // Show final score
        }

        skipBtn.addEventListener('click', finishCelebration);

        function resetGame() {
            score = 0;
            level = 1;
            tiesDestroyed = 0;
            sdsDestroyed = 0;
            lives = MAX_LIVES;
            isInvulnerable = false;
            isTransitioning = false;
            isCelebrating = false;
            skipBtn.style.display = 'none';
            winAudio.pause();
            winAudio.currentTime = 0;

            // Restart intro music
            introAudio.currentTime = 0;
            introAudio.play().catch(e => console.log(e));

            scoreVal.innerText = score;
            ammo = MAX_AMMO;
            updateAmmoUI();
            isGameOver = false;
            isGameWon = false;
            gameOverScreen.style.display = 'none';
            player.x = canvas.width / 2;
            lasers.length = 0;
            enemyLasers.length = 0;
            enemies.length = 0;
            starDestroyers.length = 0;
            turrets.length = 0;
            allies.length = 0;
            ammoDrops.length = 0;
            lastEnemySpawn = 0;
            lastStarDestroyerSpawn = 0;
            lastAmmoSpawn = Date.now();
            enemySpawnRate = 1500;
            keys.ArrowLeft = false;
            keys.ArrowRight = false;
            keys.Space = false;

            // reset win styling
            gameOverScreen.querySelector('h2').style.color = "#ff3333";
            gameOverScreen.querySelector('h2').style.textShadow = "0 0 10px #ff3333";

            animationId = requestAnimationFrame(loop);
        }

        // Start Game
        updateAmmoUI();
        animationId = requestAnimationFrame(loop);
    </script>
</body>

</html>
